<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مساعد يسطا الذكي 🤖 | Yasta AI Assistant</title>
    <meta name="description" content="مساعد يسطا الذكي — اسأل عن أي مشكلة في بيتك واحصل على تشخيص فوري بالذكاء الاصطناعي مع تقدير التكلفة ونوع الفني المطلوب.">

    <!-- Tailwind Config — نفس إعدادات index.html -->

        }

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ============================================
           CHATBOT — PREMIUM STYLES
        ============================================ */

        html, body {
            height: 100%;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            height: 100vh;
            background: #0f172a;
        }

        /* ---- Header ---- */
        .chat-header {
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 50;
        }

        /* ---- Messages Area ---- */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* ---- Message Bubbles ---- */
        .msg-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .msg-row.user {
            justify-content: flex-start; /* RTL: flex-start = right side */
        }

        .msg-row.ai {
            justify-content: flex-end; /* RTL: flex-end = left side */
        }

        @keyframes msgSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: 1.25rem;
            font-size: 0.9375rem;
            line-height: 1.7;
            word-break: break-word;
            position: relative;
        }

        @media (min-width: 640px) {
            .msg-bubble { max-width: 70%; }
        }

        /* User bubble */
        .msg-bubble.user-bubble {
            background: linear-gradient(135deg, #3b82f6, #4f46e5);
            color: white;
            border-bottom-right-radius: 0.375rem;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
        }

        [dir="rtl"] .msg-bubble.user-bubble {
            border-bottom-right-radius: 1.25rem;
            border-bottom-left-radius: 0.375rem;
        }

        /* AI bubble */
        .msg-bubble.ai-bubble {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            color: #f1f5f9;
            border-bottom-left-radius: 0.375rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        [dir="rtl"] .msg-bubble.ai-bubble {
            border-bottom-left-radius: 1.25rem;
            border-bottom-right-radius: 0.375rem;
        }

        /* AI Avatar */
        .ai-avatar {
            flex-shrink: 0;
            width: 2rem;
            height: 2rem;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* Timestamp */
        .msg-time {
            font-size: 0.6875rem;
            color: rgba(148, 163, 184, 0.7);
            margin-top: 0.375rem;
            display: block;
        }

        .msg-row.user .msg-time {
            text-align: left;
        }

        .msg-row.ai .msg-time {
            text-align: right;
        }

        /* Image thumbnail in messages */
        .msg-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .msg-image:hover {
            transform: scale(1.02);
        }

        /* ---- Chat List Formatting ---- */
        .chat-list {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
        }

        .chat-list-item {
            padding: 0.25rem 0;
            padding-right: 1.25rem;
            position: relative;
        }

        .chat-list-item.bullet::before {
            content: '•';
            position: absolute;
            right: 0;
            color: #60a5fa;
            font-weight: bold;
        }

        .chat-list-item.numbered {
            counter-increment: chat-counter;
        }

        .chat-list .chat-list-item.numbered::before {
            content: counter(chat-counter) '.';
            position: absolute;
            right: 0;
            color: #60a5fa;
            font-weight: bold;
            font-size: 0.8125rem;
        }

        .chat-list {
            counter-reset: chat-counter;
        }

        /* ---- Action Button in AI response ---- */
        .chat-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 0.75rem;
            font-size: 0.8125rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .chat-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        /* ---- Typing Indicator ---- */
        .typing-indicator {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            margin-bottom: 1rem;
            animation: msgSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .typing-dots {
            display: flex;
            gap: 0.25rem;
            padding: 1rem 1.25rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            border-bottom-right-radius: 0.375rem;
        }

        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;
            background: #60a5fa;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ---- Input Bar ---- */
        .chat-input-bar {
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 0.75rem 1rem;
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            max-width: 42rem;
            margin: 0 auto;
        }

        .input-field-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 0.25rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 0.5rem 0.75rem;
            transition: border-color 0.2s;
        }

        .input-field-wrapper:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f1f5f9;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9375rem;
            resize: none;
            max-height: 120px;
            min-height: 1.5rem;
            line-height: 1.5;
            direction: rtl;
        }

        #chat-input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .input-btn {
            flex-shrink: 0;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            background: transparent;
            color: #94a3b8;
        }

        .input-btn:hover {
            color: #e2e8f0;
            background: rgba(255,255,255,0.08);
        }

        .input-btn:active {
            transform: scale(0.92);
        }

        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
            color: white !important;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.35);
        }

        .send-btn:hover {
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.5);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        /* ---- Image Preview Strip ---- */
        .image-preview-strip {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            max-width: 42rem;
            margin: 0 auto 0.5rem;
        }

        .image-preview-strip.active {
            display: flex;
        }

        .preview-thumb {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 0.75rem;
            object-fit: cover;
            border: 2px solid rgba(59, 130, 246, 0.4);
        }

        .preview-remove {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .preview-remove:hover {
            background: rgba(239, 68, 68, 1);
            transform: scale(1.1);
        }

        .preview-filename {
            font-size: 0.75rem;
            color: #94a3b8;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ---- Welcome Screen ---- */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
            animation: fadeInWelcome 0.6s ease-out;
        }

        @keyframes fadeInWelcome {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            position: relative;
            animation: floatIcon 3s ease-in-out infinite;
        }

        .welcome-icon::after {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes glowPulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 0.8; }
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            max-width: 320px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            max-width: 400px;
        }

        .suggestion-chip {
            padding: 0.625rem 1rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1rem;
            color: #e2e8f0;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }

        .suggestion-chip:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .suggestion-chip:active {
            transform: translateY(0);
        }

        /* ---- Toast ---- */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            color: #f1f5f9;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- Image Modal (lightbox) ---- */
        .image-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .image-modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .image-modal-close:hover {
            background: rgba(255,255,255,0.25);
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .chat-header .header-inner {
                padding: 0.625rem 0.75rem;
            }

            .msg-bubble {
                max-width: 88%;
                font-size: 0.875rem;
            }

            .welcome-icon { font-size: 3rem; }
            .welcome-title { font-size: 1.25rem; }
        }

        /* Subtle background pattern */
        .chat-messages {
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.03) 0%, transparent 50%);
        }
    </style>

<script>if(localStorage.getItem('theme')==='dark'||(!('theme' in localStorage)&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}else{document.documentElement.classList.remove('dark')}</script>
</head>

                <!-- Left side: Clear button -->

        <!-- ==================== MESSAGES AREA ==================== -->
        <div id="chat-messages" class="chat-messages">

            <!-- Welcome Screen (shown when no messages) -->

                <!-- Send Button -->
                <button id="send-btn" class="input-btn send-btn" title="إرسال" type="button">
                    <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== Toast ==================== -->
    <div id="toast" class="toast"></div>

    <!-- ==================== Image Modal ==================== -->
    <div id="image-modal" class="image-modal">
        <button id="image-modal-close" class="image-modal-close">✕</button>
        <img id="image-modal-img" src="" alt="صورة مكبرة">
    </div>

    <!-- ==================== Hidden File Input ==================== -->
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">


    <!-- ==================== SCRIPTS ==================== -->
    <script type="module">
        import { sendMessage, clearChat, getHistory, formatResponse } from './js/chatbot.js';

        // ==========================================
        // DOM Elements
        // ==========================================
        const messagesEl = document.getElementById('chat-messages');
        const welcomeEl = document.getElementById('welcome-screen');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const attachBtn = document.getElementById('attach-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const fileInput = document.getElementById('file-input');
        const clearBtn = document.getElementById('clear-chat-btn');
        const previewStrip = document.getElementById('image-preview-strip');
        const previewThumb = document.getElementById('preview-thumb');
        const previewFilename = document.getElementById('preview-filename');
        const previewRemove = document.getElementById('preview-remove');
        const toastEl = document.getElementById('toast');
        const imageModal = document.getElementById('image-modal');
        const imageModalImg = document.getElementById('image-modal-img');
        const imageModalClose = document.getElementById('image-modal-close');

        // ==========================================
        // State
        // ==========================================
        let selectedImageBase64 = null;
        let selectedImageDataUrl = null;
        let isProcessing = false;

        // ==========================================
        // Restore conversation from sessionStorage
        // ==========================================
        function restoreConversation() {
            const history = getHistory();
            if (history.length === 0) {
                welcomeEl.style.display = 'flex';
                return;
            }

            welcomeEl.style.display = 'none';

            history.forEach(msg => {
                if (msg.role === 'user') {
                    const textPart = msg.parts.find(p => p.text);
                    addMessageToUI('user', textPart?.text || '', null, false);
                } else if (msg.role === 'model') {
                    const textPart = msg.parts.find(p => p.text);
                    addMessageToUI('ai', textPart?.text || '', null, false);
                }
            });

            scrollToBottom();
        }

        // ==========================================
        // Add message to UI
        // ==========================================
        function addMessageToUI(type, text, imageDataUrl = null, animate = true) {
            const row = document.createElement('div');
            row.className = `msg-row ${type}`;
            if (!animate) row.style.animation = 'none';

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            if (type === 'ai') {
                // AI message with avatar
                const avatar = document.createElement('div');
                avatar.className = 'ai-avatar';
                avatar.textContent = '🤖';

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble ai-bubble';
                bubble.innerHTML = formatResponse(text);

                const time = document.createElement('span');
                time.className = 'msg-time';
                time.textContent = timeStr;
                bubble.appendChild(time);

                // RTL: avatar on the right (flex-end = left in RTL, so avatar at end)
                row.appendChild(bubble);
                row.appendChild(avatar);
            } else {
                // User message
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble user-bubble';

                if (imageDataUrl) {
                    const img = document.createElement('img');
                    img.className = 'msg-image';
                    img.src = imageDataUrl;
                    img.alt = 'صورة مرفقة';
                    img.addEventListener('click', () => openImageModal(imageDataUrl));
                    bubble.appendChild(img);
                    bubble.appendChild(document.createElement('br'));
                }

                if (text && text.trim()) {
                    const textNode = document.createElement('span');
                    textNode.textContent = text;
                    bubble.appendChild(textNode);
                }

                const time = document.createElement('span');
                time.className = 'msg-time';
                time.textContent = timeStr;
                bubble.appendChild(time);

                row.appendChild(bubble);
            }

            // Insert before typing indicator or at end
            const typingEl = messagesEl.querySelector('.typing-indicator');
            if (typingEl) {
                messagesEl.insertBefore(row, typingEl);
            } else {
                messagesEl.appendChild(row);
            }

            if (animate) scrollToBottom();
        }

        // ==========================================
        // Typing Indicator
        // ==========================================
        function showTyping() {
            const existing = messagesEl.querySelector('.typing-indicator');
            if (existing) return;

            const row = document.createElement('div');
            row.className = 'typing-indicator';

            const avatar = document.createElement('div');
            avatar.className = 'ai-avatar';
            avatar.textContent = '🤖';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            row.appendChild(dots);
            row.appendChild(avatar);
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function hideTyping() {
            const el = messagesEl.querySelector('.typing-indicator');
            if (el) el.remove();
        }

        // ==========================================
        // Scroll
        // ==========================================
        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        // ==========================================
        // Toast
        // ==========================================
        function showToast(msg, duration = 2500) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        // ==========================================
        // Image Modal
        // ==========================================
        function openImageModal(src) {
            imageModalImg.src = src;
            imageModal.classList.add('active');
        }

        imageModalClose.addEventListener('click', () => imageModal.classList.remove('active'));
        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) imageModal.classList.remove('active');
        });

        // ==========================================
        // File Attachment
        // ==========================================
        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('⚠️ من فضلك اختر صورة');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showToast('⚠️ حجم الصورة كبير (الحد الأقصى 10MB)');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                selectedImageDataUrl = event.target.result;
                // Extract base64 (remove data:image/...;base64, prefix)
                selectedImageBase64 = event.target.result.split(',')[1];

                previewThumb.src = selectedImageDataUrl;
                previewFilename.textContent = file.name;
                previewStrip.classList.add('active');
            };
            reader.readAsDataURL(file);

            // Reset file input
            fileInput.value = '';
        });

        previewRemove.addEventListener('click', () => {
            selectedImageBase64 = null;
            selectedImageDataUrl = null;
            previewStrip.classList.remove('active');
        });

        // ==========================================
        // Voice Button (Coming Soon)
        // ==========================================
        voiceBtn.addEventListener('click', () => {
            showToast('🎙️ الرسائل الصوتية قريباً!');
        });

        // ==========================================
        // Send Message
        // ==========================================
        async function handleSend() {
            if (isProcessing) return;

            const text = inputEl.value.trim();
            const hasImage = !!selectedImageBase64;

            if (!text && !hasImage) return;

            // Hide welcome screen
            welcomeEl.style.display = 'none';

            // Add user message to UI
            addMessageToUI('user', text, hasImage ? selectedImageDataUrl : null);

            // Clear input
            inputEl.value = '';
            inputEl.style.height = 'auto';

            // Save image data before clearing
            const imgBase64 = selectedImageBase64;

            // Clear image preview
            selectedImageBase64 = null;
            selectedImageDataUrl = null;
            previewStrip.classList.remove('active');

            // Show typing
            isProcessing = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await sendMessage(text || '', imgBase64);
                hideTyping();
                addMessageToUI('ai', response);
            } catch (error) {
                hideTyping();
                addMessageToUI('ai', '❌ ' + error.message);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);

        // Send on Enter (Shift+Enter for newline)
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Auto-resize textarea
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        // ==========================================
        // Suggestion Chips
        // ==========================================
        document.querySelectorAll('.suggestion-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const msg = chip.dataset.msg;

                // If it's the image suggestion, open file picker
                if (msg.includes('صورة')) {
                    fileInput.click();
                    return;
                }

                inputEl.value = msg;
                handleSend();
            });
        });

        // ==========================================
        // Clear Chat
        // ==========================================
        clearBtn.addEventListener('click', () => {
            if (getHistory().length === 0) return;

            // Remove all messages
            const msgRows = messagesEl.querySelectorAll('.msg-row, .typing-indicator');
            msgRows.forEach(el => el.remove());

            // Show welcome screen
            welcomeEl.style.display = 'flex';

            // Clear history
            clearChat();

            showToast('🗑️ تم مسح المحادثة');
        });

        // ==========================================
        // Initialize
        // ==========================================
        restoreConversation();
        inputEl.focus();

        // Handle back gesture for mobile
        window.addEventListener('popstate', () => {
            window.location.href = 'index.html';
        });
    </script>

</body>
</html>
