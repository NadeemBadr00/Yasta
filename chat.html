<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد يسطا الذكي | Yasta AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcfc; --surface: #ffffff; --text: #1f1f1f; --muted: #444746;
            --user-bubble: #f2f0f0; --send-ready: #d3e3fd; --send-text: #062e6f;
            --send-disabled: #e8eaed; --glow: #a9d1fb; --border: #e8eaed;
            --sidebar-bg: #f0f4f9; --sidebar-hover: #dde3ea; --code-bg: #f5f5f5;
        }
        html.dark {
            --bg: #131314; --surface: #1e1f20; --text: #e3e3e3; --muted: #c4c7c5;
            --user-bubble: #333537; --send-ready: #1f3760; --send-text: #a8c7fa;
            --send-disabled: #333537; --glow: #1d4068; --border: #3c4043;
            --sidebar-bg: #1e1f20; --sidebar-hover: #2a2b2d; --code-bg: #282a2c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        /* Sidebar */
        .sidebar {
            width: 280px; background: var(--sidebar-bg); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; transition: all 0.3s;
            flex-shrink: 0;
        }
        .sidebar.collapsed { width: 0; overflow: hidden; border: none; }
        .sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .new-chat-btn {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            border-radius: 24px; border: 1px solid var(--border); background: transparent;
            color: var(--text); font-family: 'Cairo'; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.2s; width: 100%;
        }
        .new-chat-btn:hover { background: var(--sidebar-hover); }
        .sidebar-history { flex: 1; overflow-y: auto; padding: 8px; }
        .history-item {
            padding: 10px 16px; border-radius: 16px; font-size: 13px; font-weight: 600;
            color: var(--muted); cursor: pointer; transition: all 0.15s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
        }
        .history-item:hover { background: var(--sidebar-hover); color: var(--text); }
        .history-item.active { background: var(--sidebar-hover); color: var(--text); }
        .sidebar-footer {
            padding: 16px; border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--muted);
            text-decoration: none; transition: all 0.15s; border: none; background: none;
            cursor: pointer; font-family: 'Cairo';
        }
        .sidebar-link:hover { background: var(--sidebar-hover); color: var(--text); }

        /* Main area */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .main-header {
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid transparent; flex-shrink: 0;
        }
        .main-header .model-name {
            font-size: 15px; font-weight: 800; color: var(--muted);
            display: flex; align-items: center; gap: 6px;
        }
        .toggle-sidebar {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: transparent; color: var(--muted); font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .toggle-sidebar:hover { background: var(--sidebar-hover); }
        .header-actions { display: flex; gap: 4px; }

        /* Chat area */
        .chat-area {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            scroll-behavior: smooth;
        }
        .chat-container {
            max-width: 820px; width: 100%; margin: 0 auto; padding: 0 24px;
            flex: 1; display: flex; flex-direction: column;
        }

        /* Empty state */
        .empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 720px; height: 330px; pointer-events: none;
            background: radial-gradient(closest-side, var(--glow), transparent);
            opacity: 0.7; filter: blur(55px);
        }
        .welcome-text { position: relative; z-index: 1; text-align: center; }
        .welcome-text h1 {
            font-size: 40px; font-weight: 800;
            background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc05, #34a853);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .welcome-text h2 { font-size: 36px; font-weight: 600; color: var(--muted); }

        /* Suggestion chips */
        .suggestions {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px; margin-top: 32px; max-width: 640px;
        }
        .suggestion-chip {
            padding: 14px 18px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-align: right;
            font-family: 'Cairo'; line-height: 1.5;
        }
        .suggestion-chip:hover { background: var(--sidebar-hover); border-color: var(--muted); }
        .suggestion-chip .chip-icon { font-size: 18px; margin-bottom: 6px; display: block; }

        /* Messages */
        .messages-wrapper { padding-bottom: 16px; }
        .message { margin: 8px 0; display: flex; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.user { justify-content: flex-end; }
        .message.user .bubble {
            background: var(--user-bubble); border-radius: 24px;
            padding: 12px 20px; max-width: 75%; font-size: 15px; line-height: 1.7;
            font-weight: 600;
        }
        .message.assistant { flex-direction: column; }
        .message.assistant .bubble {
            font-size: 15px; line-height: 1.8; padding: 8px 0; font-weight: 500;
            width: 100%;
        }
        .message.assistant .bubble strong { font-weight: 800; }
        .message.assistant .bubble code {
            background: var(--code-bg); padding: 2px 6px; border-radius: 6px;
            font-size: 13px; font-family: 'Courier New', monospace;
        }
        .message.assistant .bubble pre {
            background: var(--code-bg); padding: 16px; border-radius: 12px;
            overflow-x: auto; margin: 12px 0; font-size: 13px; line-height: 1.6;
            font-family: 'Courier New', monospace; position: relative;
        }
        .message.assistant .bubble pre .copy-code {
            position: absolute; top: 8px; left: 8px; background: var(--border);
            border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px;
            cursor: pointer; color: var(--text); font-family: 'Cairo'; font-weight: 700;
        }
        .message.assistant .bubble ul, .message.assistant .bubble ol {
            padding-right: 20px; margin: 8px 0;
        }
        .message.assistant .bubble li { margin: 4px 0; }
        .message.assistant .bubble h3 { font-size: 17px; font-weight: 800; margin: 16px 0 8px; }
        .message.assistant .bubble p { margin: 6px 0; }

        .action-bar {
            display: flex; gap: 4px; padding: 4px 0; opacity: 0; transition: opacity 0.2s;
        }
        .message.assistant:hover .action-bar { opacity: 1; }
        .action-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: transparent; color: var(--muted); cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .action-btn:hover { background: var(--sidebar-hover); }

        /* Thinking indicator */
        .thinking { display: flex; align-items: center; gap: 8px; padding: 12px 0; }
        .thinking-dots { display: flex; gap: 4px; }
        .thinking-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #ea4335);
            animation: pulse 1.4s infinite ease-in-out;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        /* Composer */
        .composer-wrapper {
            padding: 8px 24px 20px; flex-shrink: 0;
            max-width: 820px; width: 100%; margin: 0 auto;
        }
        .composer {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 28px; padding: 8px 8px 8px 16px;
            transition: all 0.2s; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .composer:focus-within { border-color: #4285f4; box-shadow: 0 2px 12px rgba(66,133,244,0.15); }
        .composer textarea {
            flex: 1; border: none; outline: none; resize: none; background: transparent;
            font-family: 'Cairo'; font-size: 16px; font-weight: 600; color: var(--text);
            max-height: 200px; overflow-y: auto; line-height: 1.6; padding: 8px 0;
            min-height: 24px;
        }
        .composer textarea::placeholder { color: var(--muted); }
        .composer .attach-btn, .composer .send-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s; flex-shrink: 0; font-size: 18px;
        }
        .composer .attach-btn {
            background: transparent; color: var(--muted);
        }
        .composer .attach-btn:hover { background: var(--sidebar-hover); }
        .composer .send-btn {
            background: var(--send-disabled); color: var(--muted);
        }
        .composer .send-btn.ready {
            background: var(--send-ready); color: var(--send-text);
        }
        .composer .send-btn.running {
            background: var(--send-disabled); color: var(--text);
        }
        .disclaimer {
            text-align: center; font-size: 11px; color: var(--muted);
            padding: 8px 0 0; font-weight: 600;
        }

        /* Image preview */
        .image-preview {
            display: none; padding: 8px 16px; align-items: center; gap: 8px;
        }
        .image-preview.show { display: flex; }
        .image-preview img {
            width: 48px; height: 48px; object-fit: cover; border-radius: 12px;
            border: 2px solid var(--border);
        }
        .image-preview .remove-img {
            background: var(--user-bubble); border: none; border-radius: 50%;
            width: 24px; height: 24px; font-size: 14px; cursor: pointer;
            color: var(--muted); display: flex; align-items: center; justify-content: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 100; height: 100%; width: 280px; left: auto; right: 0; transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar.collapsed { transform: translateX(100%); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
            .sidebar-overlay.show { display: block; }
            .welcome-text h1 { font-size: 28px; }
            .welcome-text h2 { font-size: 24px; }
            .suggestions { grid-template-columns: 1fr 1fr; }
            .composer-wrapper { padding: 8px 12px 16px; }
        }

        /* Markdown tables */
        .message.assistant .bubble table {
            border-collapse: collapse; width: 100%; margin: 12px 0;
            font-size: 13px; border-radius: 12px; overflow: hidden;
        }
        .message.assistant .bubble th, .message.assistant .bubble td {
            border: 1px solid var(--border); padding: 8px 12px; text-align: right;
        }
        .message.assistant .bubble th { background: var(--code-bg); font-weight: 800; }
    </style>
</head>
<body>
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <span>✏️</span> محادثة جديدة
            </button>
        </div>
        <div class="sidebar-history" id="historyList">
            <div style="padding: 16px; text-align: center; color: var(--muted); font-size: 13px; font-weight: 600;">
                لا توجد محادثات سابقة
            </div>
        </div>
        <div class="sidebar-footer">
            <a href="index.html" class="sidebar-link">🏠 الصفحة الرئيسية</a>
            <button class="sidebar-link" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span> تبديل المظهر
            </button>
        </div>
    </aside>

    <!-- Main -->
    <div class="main">
        <!-- Header -->
        <header class="main-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <button class="toggle-sidebar" onclick="toggleSidebar()" title="القائمة">☰</button>
                <div class="model-name">
                    <span style="font-size:20px;">✨</span> مساعد يسطا <span style="font-size:11px;opacity:0.6;">Gemini 2.5 Flash</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="toggle-sidebar" onclick="toggleTheme()" title="تبديل المظهر">
                    <span id="themeIconHeader">🌙</span>
                </button>
            </div>
        </header>

        <!-- Chat -->
        <div class="chat-area" id="chatArea">
            <div class="chat-container" id="chatContainer">
                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <div class="ambient-glow"></div>
                    <div class="welcome-text">
                        <h1>مساعد يسطا الذكي</h1>
                        <h2>كيف أقدر أساعدك النهارده؟</h2>
                        <div class="suggestions">
                            <div class="suggestion-chip" onclick="sendSuggestion('عندي تسريب مياه في المطبخ')">
                                <span class="chip-icon">🔧</span>
                                عندي تسريب مياه في المطبخ
                            </div>
                            <div class="suggestion-chip" onclick="sendSuggestion('الكهربا بتفصل كل شوية')">
                                <span class="chip-icon">⚡</span>
                                الكهربا بتفصل كل شوية
                            </div>
                            <div class="suggestion-chip" onclick="sendSuggestion('التكييف مش بيبرد كويس')">
                                <span class="chip-icon">❄️</span>
                                التكييف مش بيبرد كويس
                            </div>
                            <div class="suggestion-chip" onclick="sendSuggestion('محتاج أعرف تكلفة دهان شقة')">
                                <span class="chip-icon">🎨</span>
                                محتاج أعرف تكلفة دهان شقة
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages-wrapper" id="messagesWrapper" style="display:none;"></div>
            </div>
        </div>

        <!-- Composer -->
        <div class="composer-wrapper">
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="">
                <button class="remove-img" onclick="removeImage()">✕</button>
            </div>
            <div class="composer" id="composer">
                <label class="attach-btn" for="imageInput" title="إرفاق صورة">📎</label>
                <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleImage(event)">
                <textarea id="userInput" rows="1" placeholder="اكتب رسالتك هنا..." onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled title="إرسال">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </button>
            </div>
            <div class="disclaimer">مساعد يسطا يمكن أن يخطئ. تحقق من المعلومات المهمة.</div>
        </div>
    </div>

    <script>
        // ========== Theme ==========
        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = isDark ? '☀️' : '🌙';
            document.getElementById('themeIcon').textContent = icon;
            document.getElementById('themeIconHeader').textContent = icon;
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        }
        updateThemeIcons();

        // ========== Sidebar ==========
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
                sidebar.classList.remove('collapsed');
                overlay.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });

        // ========== Auto-resize textarea ==========
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
            const hasText = userInput.value.trim().length > 0;
            sendBtn.disabled = !hasText && !currentImage;
            sendBtn.classList.toggle('ready', hasText || !!currentImage);
        });

        // ========== Image handling ==========
        let currentImage = null;
        function handleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImage = ev.target.result;
                document.getElementById('previewImg').src = currentImage;
                document.getElementById('imagePreview').classList.add('show');
                sendBtn.disabled = false;
                sendBtn.classList.add('ready');
            };
            reader.readAsDataURL(file);
        }
        function removeImage() {
            currentImage = null;
            document.getElementById('imagePreview').classList.remove('show');
            document.getElementById('imageInput').value = '';
            const hasText = userInput.value.trim().length > 0;
            sendBtn.disabled = !hasText;
            sendBtn.classList.toggle('ready', hasText);
        }

        // ========== Chat State ==========
        let conversationHistory = [];
        let isRunning = false;
        const chatHistory = JSON.parse(localStorage.getItem('yasta-gemini-chats') || '[]');

        function newChat() {
            conversationHistory = [];
            document.getElementById('messagesWrapper').innerHTML = '';
            document.getElementById('messagesWrapper').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            if (window.innerWidth <= 768) { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
        }

        // ========== API Keys & Sending ==========
        const API_KEYS = [
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY',
            'YOUR_API_KEY'
        ];
        let keyIdx = Math.floor(Math.random() * API_KEYS.length);
        const getKey = () => { const k = API_KEYS[keyIdx]; keyIdx = (keyIdx + 1) % API_KEYS.length; return k; };

        const SYSTEM_PROMPT = `أنت "مساعد يسطا" — مساعد ذكي متخصص في خدمات الصيانة المنزلية في مصر.
مهمتك: تشخيص الأعطال (سباكة، كهربا، نجارة، تكييف، دهانات، أجهزة)، تقديم نصائح إصلاح، تقدير التكلفة بالجنيه المصري، تحديد نوع الفني المطلوب.
قواعد: تكلم عامية مصرية ودية ومهنية. ردودك مختصرة وعملية. استخدم إيموجي باعتدال. في نهاية كل تشخيص اقترح "اطلب فني من يسطا". لو السؤال مش عن صيانة رد بلطف إنك متخصص في الصيانة بس.`;

        // ========== Send Message ==========
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !currentImage) return;
            if (isRunning) return;

            // Hide empty state
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messagesWrapper').style.display = 'block';

            // Add user message
            const parts = [];
            if (text) parts.push({ text });
            if (currentImage) {
                const base64 = currentImage.split(',')[1];
                const mime = currentImage.match(/data:(.*?);/)[1];
                parts.push({ inline_data: { mime_type: mime, data: base64 } });
            }

            addUserMessage(text, currentImage);
            conversationHistory.push({ role: 'user', parts: parts.map(p => p.text ? { text: p.text } : p) });

            // Reset input
            userInput.value = '';
            userInput.style.height = 'auto';
            removeImage();
            sendBtn.disabled = true;
            sendBtn.classList.remove('ready');

            // Show thinking
            const thinkingEl = showThinking();
            isRunning = true;
            sendBtn.classList.add('running');
            sendBtn.innerHTML = '<div style="width:12px;height:12px;border-radius:3px;background:currentColor;"></div>';

            // Call API with retry
            let response = null;
            for (let attempt = 0; attempt < 3; attempt++) {
                try {
                    const key = getKey();
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                            contents: conversationHistory,
                            generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
                        })
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    response = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (response) break;
                } catch (err) {
                    console.warn(`Attempt ${attempt + 1} failed:`, err);
                }
            }

            // Remove thinking
            thinkingEl.remove();
            isRunning = false;
            sendBtn.classList.remove('running');
            sendBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>';

            if (response) {
                conversationHistory.push({ role: 'model', parts: [{ text: response }] });
                addAssistantMessage(response);
                saveToHistory(text);
            } else {
                addAssistantMessage('عذراً، حصل خطأ. جرب تاني. 🔄');
            }
        }

        function sendSuggestion(text) {
            userInput.value = text;
            userInput.dispatchEvent(new Event('input'));
            handleSend();
        }

        // ========== Render Messages ==========
        function addUserMessage(text, image) {
            const wrapper = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            div.className = 'message user';
            let content = '';
            if (image) content += `<img src="${image}" style="max-width:200px;border-radius:16px;margin-bottom:8px;display:block;">`;
            if (text) content += escapeHtml(text);
            div.innerHTML = `<div class="bubble">${content}</div>`;
            wrapper.appendChild(div);
            scrollToBottom();
        }

        function addAssistantMessage(text) {
            const wrapper = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            div.className = 'message assistant';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            div.appendChild(bubble);
            
            // Action bar
            const actions = document.createElement('div');
            actions.className = 'action-bar';
            actions.innerHTML = `
                <button class="action-btn" onclick="copyText(this)" title="نسخ">📋</button>
                <button class="action-btn" onclick="this.textContent='👍'" title="مفيد">👍</button>
                <button class="action-btn" onclick="this.textContent='👎'" title="غير مفيد">👎</button>
            `;
            div.appendChild(actions);
            wrapper.appendChild(div);

            // Typing effect
            typeMessage(bubble, text);
        }

        function typeMessage(el, text) {
            const html = markdownToHtml(text);
            const chars = html.split('');
            let i = 0;
            let currentHtml = '';
            const speed = 8;
            
            function type() {
                if (i < chars.length) {
                    // Handle HTML tags - add whole tag at once
                    if (chars[i] === '<') {
                        let tag = '';
                        while (i < chars.length && chars[i - 1] !== '>') { tag += chars[i]; i++; }
                        currentHtml += tag;
                    } else {
                        currentHtml += chars[i];
                        i++;
                    }
                    el.innerHTML = currentHtml;
                    scrollToBottom();
                    setTimeout(type, speed);
                }
            }
            // Fast render for long messages
            if (text.length > 500) {
                el.innerHTML = html;
                scrollToBottom();
            } else {
                el.innerHTML = html;
                scrollToBottom();
            }
        }

        function showThinking() {
            const wrapper = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            div.className = 'thinking';
            div.innerHTML = `
                <div class="thinking-dots"><span></span><span></span><span></span></div>
                <span style="font-size:13px;color:var(--muted);font-weight:600;">بفكر...</span>
            `;
            wrapper.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
        }

        // ========== Markdown Parser ==========
        function markdownToHtml(md) {
            let html = escapeHtml(md);
            // Code blocks
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => 
                `<pre><button class="copy-code" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent);this.textContent='✓ تم'"">نسخ</button><code>${code.trim()}</code></pre>`
            );
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            // Lists
            html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');
            // Numbered lists
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            // Clean up double <br>
            html = html.replace(/<br><br>/g, '</p><p>');
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyText(btn) {
            const bubble = btn.closest('.message').querySelector('.bubble');
            navigator.clipboard.writeText(bubble.textContent);
            btn.textContent = '✓';
            setTimeout(() => btn.textContent = '📋', 2000);
        }

        // ========== History ==========
        function saveToHistory(title) {
            if (!title) return;
            const short = title.substring(0, 40);
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = short;
            item.onclick = () => item.classList.add('active');
            if (list.querySelector('div[style]')) list.innerHTML = '';
            list.prepend(item);
        }
    </script>
</body>
</html>
