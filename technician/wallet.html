<!-- technician/wallet.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')};</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يسطا | المحفظة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 500: '#3b82f6', 600: '#2563eb' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', text: '#f8fafc', muted: '#94a3b8' } }, fontFamily: { cairo: ['Cairo', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-dark-text flex flex-col min-h-screen">

    <header class="bg-white dark:bg-dark-card shadow-sm dark:shadow-none dark:border-b dark:border-dark-border py-4 px-4 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-primary-600 dark:text-primary-400">المحفظة</h1>
            <a href="reviews.html" class="bg-gray-100 dark:bg-slate-800 px-4 py-1.5 rounded-full font-bold text-sm hover:bg-gray-200 transition">⭐ التقييمات</a>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-6 slide-up pb-24">
        
        <!-- تصميم البطاقة البنكية -->
        <div class="relative w-full h-48 rounded-3xl bg-gradient-to-br from-gray-900 to-gray-800 dark:from-primary-900 dark:to-slate-900 text-white shadow-2xl overflow-hidden p-6 flex flex-col justify-between transform hover:scale-[1.02] transition-transform">
            <!-- دوائر خلفية للتزيين -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-5 rounded-full"></div>
            <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-white opacity-5 rounded-full"></div>
            
            <div class="flex justify-between items-start relative z-10">
                <span class="text-xs font-bold text-gray-300 uppercase tracking-widest">Net Balance</span>
                <!-- أيقونة الشريحة -->
                <svg class="w-8 h-8 text-yellow-400 opacity-80" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v2h4V6H6zm6 0v2h4V6h-4zm6 0v2h2V6h-2zM6 10v4h4v-4H6zm6 0v4h4v-4h-4zm6 0v4h2v-4h-2zM6 16v2h4v-2H6zm6 0v2h4v-2h-4zm6 0v2h2v-2h-2z"/></svg>
            </div>
            
            <div class="relative z-10 mt-2">
                <div class="text-4xl font-black drop-shadow-md" id="net-profit">0.00 <span class="text-lg font-normal opacity-80">EGP</span></div>
                <p class="text-xs text-gray-400 mt-1">الرصيد الصافي القابل للسحب</p>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <p class="text-xs text-gray-500 dark:text-dark-muted font-bold mb-1">إجمالي التحصيل</p>
                <p class="font-black text-lg text-gray-800 dark:text-white" id="total-revenue">0 ج.م</p>
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border">
                <p class="text-xs text-gray-500 dark:text-dark-muted font-bold mb-1">عمولة التطبيق (10%)</p>
                <p class="font-black text-lg text-red-500 dark:text-red-400" id="app-commission">-0 ج.م</p>
            </div>
        </div>

        <div>
            <h3 class="font-black text-gray-800 dark:text-white mb-3">سجل العمليات</h3>
            <div id="transactions-container" class="space-y-3">
                <div class="text-center py-5 text-gray-500">جاري حساب الأرباح...</div>
            </div>
        </div>

    </main>

    <script type="module" src="js/wallet.js"></script>
    <script type="module">
        import { injectBottomNav } from '../js/shared.js';
        injectBottomNav('technician', 'wallet');
    </script>
</body>
</html>
