<!-- admin/categories.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')};</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يسطا | إدارة التخصصات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 500: '#3b82f6', 600: '#2563eb' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', text: '#f8fafc', muted: '#94a3b8' } }, fontFamily: { cairo: ['Cairo', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-dark-text flex h-screen overflow-hidden transition-colors">

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-slate-900 text-white w-64 flex-shrink-0 flex flex-col transition-all duration-300 transform translate-x-full md:translate-x-0 fixed md:relative z-50 h-full right-0 shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h1 class="text-2xl font-black text-primary-400">يـسـطـا <span class="text-xs text-slate-400 block">Admin Panel</span></h1>
            <button id="close-sidebar" class="text-gray-400 text-2xl hover:text-white transition">&times;</button>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-xl font-bold transition">
                <span>📊</span> نظرة عامة
            </a>
            <a href="live-map.html" class="flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-xl font-bold transition">
                <span>🛰️</span> الخريطة الحية
            </a>
            <a href="verify-users.html" class="flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-xl font-bold transition">
                <span>🛡️</span> طلبات التوثيق
            </a>
            <a href="categories.html" class="flex items-center gap-3 bg-primary-600/20 text-primary-400 px-4 py-3 rounded-xl font-bold transition">
                <span>🧰</span> التخصصات
            </a>
            <a href="packages.html" class="flex items-center gap-3 text-slate-400 hover:bg-slate-800 hover:text-white px-4 py-3 rounded-xl font-bold transition">
                <span>📦</span> الباقات
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button id="logout-btn" class="w-full flex justify-center items-center gap-2 bg-red-500/10 text-red-400 hover:bg-red-500/20 py-2.5 rounded-xl font-bold transition">
                <span>🚪</span> تسجيل خروج
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden relative w-full">
        
        <!-- Header -->
        <header class="bg-white dark:bg-dark-card shadow-sm dark:border-b dark:border-dark-border p-4 flex justify-between items-center z-40">
            <div class="flex items-center gap-3">
                <button id="open-sidebar" class="text-2xl text-gray-800 dark:text-white hover:text-primary-600 transition">☰</button>
                <h1 class="text-lg font-black text-primary-600 dark:text-primary-400">التخصصات</h1>
            </div>
        </header>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden backdrop-blur-sm"></div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 slide-up">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
                
                <!-- نموذج إضافة تخصص جديد -->
                <div class="bg-white dark:bg-dark-card p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border h-fit">
                    <h2 class="text-xl font-black text-gray-800 dark:text-white mb-4 border-b dark:border-dark-border pb-2">إضافة تخصص جديد</h2>
                    <form id="add-category-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-1.5">اسم التخصص</label>
                            <input type="text" id="cat-name" required placeholder="مثال: سباكة، كهرباء..." class="w-full px-4 py-2 border border-gray-200 dark:border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 bg-gray-50 dark:bg-slate-800 dark:text-white transition-all">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-1.5">أيقونة (Emoji)</label>
                            <input type="text" id="cat-icon" required placeholder="مثال: 🔧، ⚡، 🪚" class="w-full px-4 py-2 border border-gray-200 dark:border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 bg-gray-50 dark:bg-slate-800 dark:text-white transition-all">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-1.5">وصف قصير</label>
                            <textarea id="cat-desc" rows="2" class="w-full px-4 py-2 border border-gray-200 dark:border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 bg-gray-50 dark:bg-slate-800 dark:text-white transition-all resize-none"></textarea>
                        </div>
                        <button type="submit" id="add-btn" class="w-full bg-primary-600 text-white font-black py-3 rounded-xl hover:bg-primary-700 active:scale-95 transition shadow-md">
                            إضافة التخصص
                        </button>
                    </form>
                </div>

                <!-- قائمة التخصصات الحالية -->
                <div class="lg:col-span-2 bg-white dark:bg-dark-card p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border overflow-hidden flex flex-col">
                    <div class="flex justify-between items-center mb-4 border-b dark:border-dark-border pb-2">
                        <h2 class="text-xl font-black text-gray-800 dark:text-white">التخصصات المتاحة حالياً</h2>
                    </div>
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-gray-50 dark:bg-slate-800 text-gray-600 dark:text-dark-muted text-sm rounded-lg">
                                    <th class="p-3 font-bold first:rounded-r-xl">الأيقونة</th>
                                    <th class="p-3 font-bold">اسم التخصص</th>
                                    <th class="p-3 font-bold">الوصف</th>
                                    <th class="p-3 font-bold text-center last:rounded-l-xl">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="categories-list">
                                <!-- سيتم الملء من الـ JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/categories.js"></script>
    <script type="module" src="../js/shared.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        
        function toggleSidebar() {
            sidebar.classList.toggle('translate-x-full');
            sidebar.classList.toggle('md:translate-x-0');
            sidebar.classList.toggle('md:translate-x-full');
            sidebar.classList.toggle('md:-mr-64');
            overlay.classList.toggle('hidden');
        }

        document.getElementById('open-sidebar')?.addEventListener('click', toggleSidebar);
        document.getElementById('close-sidebar')?.addEventListener('click', toggleSidebar);
        document.getElementById('sidebar-overlay')?.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
