<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')};</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يسطا | جاري البحث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' } }, fontFamily: { cairo: ['Cairo', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ===== Radar Animation ===== */
        .radar-container { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .radar-circle {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            animation: radarPulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .radar-circle:nth-child(2) { animation-delay: 0.5s; }
        .radar-circle:nth-child(3) { animation-delay: 1.0s; }
        .radar-circle:nth-child(4) { animation-delay: 1.5s; }
        @keyframes radarPulse {
            0%   { transform: scale(0.3); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* ===== Smooth state transitions ===== */
        .state-enter { animation: stateEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes stateEnter {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        .state-exit { animation: stateExit 0.35s ease-in forwards; }
        @keyframes stateExit {
            from { transform: scale(1); opacity: 1; }
            to   { transform: scale(0.95); opacity: 0; }
        }

        /* ===== Tech card hover glow ===== */
        .tech-card {
            transition: all 0.25s ease;
        }
        .tech-card:hover {
            box-shadow: 0 0 0 2px rgba(59,130,246,0.4), 0 8px 25px rgba(59,130,246,0.12);
            transform: translateY(-2px);
        }
        .tech-card:active { transform: scale(0.97); }

        /* ===== Dots loading animation ===== */
        .loading-dots span {
            display: inline-block;
            animation: dotBounce 1.4s ease-in-out infinite both;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }
    </style>
    <!-- Dark mode flicker prevention -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-dark-bg flex flex-col min-h-screen text-gray-900 dark:text-white transition-colors overflow-x-hidden">

    <!-- ===== Sticky Header ===== -->
    <div class="sticky top-0 left-0 right-0 z-50 flex justify-between items-center px-6 sm:px-8 py-4 w-full bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 shadow-sm transition-colors duration-300">
        <a href="./dashboard.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <div class="inline-flex items-center justify-center w-10 h-10 bg-primary-600 text-white rounded-xl shadow-md transform -rotate-3">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
            </div>
            <span class="text-2xl font-black text-primary-600 dark:text-primary-400 tracking-tight">
                يـسـطـا
            </span>
        </a>
        <button id="theme-toggle" class="p-3 rounded-full bg-gray-50 dark:bg-dark-card shadow-sm text-gray-600 dark:text-yellow-400 hover:scale-110 transition-transform border border-gray-200 dark:border-dark-border">
            <span id="theme-toggle-icon" class="text-xl leading-none">☀️</span>
        </button>
    </div>

    <!-- ===== Main Content ===== -->
    <main class="flex-grow flex items-center justify-center p-4 w-full relative z-10 pb-24">

        <!-- ======== STATE 1: Searching (Radar) ======== -->
        <div id="searching-state" class="text-center w-full max-w-md transition-all duration-500 ease-out">
            <div class="radar-container mb-12 mt-4">
                <!-- 4 pulse rings for smoother effect -->
                <div class="radar-circle border-2 border-primary-500/40 dark:border-white/20"></div>
                <div class="radar-circle border-2 border-primary-500/30 dark:border-white/15"></div>
                <div class="radar-circle border-2 border-primary-500/20 dark:border-white/10"></div>
                <div class="radar-circle border-2 border-primary-500/10 dark:border-white/5"></div>

                <!-- Center icon -->
                <div class="absolute inset-0 bg-white dark:bg-slate-800 rounded-full shadow-[0_0_30px_rgba(59,130,246,0.3)] dark:shadow-[0_0_30px_rgba(0,0,0,0.5)] border-4 border-primary-50 dark:border-slate-700 flex items-center justify-center w-24 h-24 m-auto z-10">
                    <span class="text-5xl">📡</span>
                </div>
            </div>

            <h1 class="text-3xl font-black mb-3 text-gray-800 dark:text-white drop-shadow-sm">جاري إرسال الإشارة...</h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg mb-4 font-bold px-4">نبحث الآن عن أقرب الفنيين المتاحين في محيطك، برجاء الانتظار.</p>

            <!-- Animated dots -->
            <div class="loading-dots text-primary-500 text-3xl mb-10">
                <span>●</span><span>●</span><span>●</span>
            </div>

            <button id="cancel-btn" class="bg-white dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-900/50 hover:bg-red-50 dark:hover:bg-red-500/20 hover:text-red-700 px-10 py-4 rounded-2xl font-black transition-all active:scale-95 shadow-sm">
                إلغاء الطلب ❌
            </button>
        </div>

        <!-- ======== STATE 2: Technician List ======== -->
        <div id="tech-list-state" class="hidden w-full max-w-lg flex flex-col h-full">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-50 dark:bg-primary-500/10 rounded-2xl mb-4">
                    <span class="text-3xl">👷</span>
                </div>
                <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-2">الفنيين المتاحين بالقرب منك</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 font-bold">اختر الفني الأنسب لطلبك</p>
            </div>

            <!-- Technician cards container (populated by JS) -->
            <div id="techs-container" class="space-y-3 w-full overflow-y-auto max-h-[50vh] px-1">
                <!-- Cards injected by JS -->
            </div>

            <!-- No techs fallback (hidden by default) -->
            <div id="no-techs-msg" class="hidden text-center py-12">
                <span class="text-5xl mb-4 block">😔</span>
                <p class="text-gray-500 dark:text-gray-400 font-bold text-lg">لا يوجد فنيين متاحين حالياً</p>
                <p class="text-gray-400 dark:text-gray-500 text-sm mt-2">حاول مرة أخرى بعد قليل</p>
            </div>

            <button id="cancel-list-btn" class="mt-6 bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 w-full py-4 rounded-2xl font-black transition-all active:scale-95 shadow-sm">
                إلغاء الطلب والعودة للرئيسية
            </button>
        </div>

        <!-- ======== STATE 3: Technician Confirmed ======== -->
        <div id="found-state" class="hidden absolute flex-col items-center text-center w-full max-w-sm top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-gray-100 dark:border-slate-700 w-full relative overflow-hidden">
                <!-- Background glow -->
                <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-primary-400/20 to-transparent"></div>

                <!-- Tech photo -->
                <div class="relative mb-5 inline-block slide-up">
                    <img id="tech-img" src="" alt="Tech" class="w-28 h-28 rounded-full border-4 border-white dark:border-slate-800 shadow-xl object-cover relative z-10">
                    <div id="tech-rating-badge" class="absolute -bottom-2 -right-2 bg-yellow-400 text-yellow-900 text-xs font-black px-3 py-1.5 rounded-xl shadow-lg z-20 border-2 border-white dark:border-slate-800 flex items-center gap-1">
                        ⭐ --
                    </div>
                </div>

                <!-- Tech info -->
                <h2 id="tech-name" class="text-2xl font-black text-gray-900 dark:text-white mb-1">---</h2>
                <p id="tech-job" class="text-gray-500 dark:text-gray-400 font-bold text-sm mb-6">---</p>

                <!-- Confirmation badge -->
                <div class="bg-primary-50 dark:bg-primary-500/10 text-primary-600 dark:text-primary-400 font-black px-4 py-3.5 rounded-2xl mb-4 flex items-center justify-center gap-2 border border-primary-200 dark:border-primary-500/20 shadow-inner">
                    <span class="text-xl">🚀</span> تم تأكيد اختيارك!
                </div>

                <p class="text-sm text-gray-400 dark:text-gray-500 font-bold animate-pulse">جاري فتح الخريطة للتتبع...</p>
            </div>
        </div>

    </main>

    <script type="module" src="js/finding-technician.js"></script>
    <script type="module" src="../js/shared.js"></script>
</body>
</html>
