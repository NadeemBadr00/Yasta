<!-- customer/tracking.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')};</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يسطا | تتبع الفني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 500: '#3b82f6', 600: '#2563eb' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' } }, fontFamily: { cairo: ['Cairo', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

        /* ── Map gradient overlay ── */
        .map-gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            z-index: 5;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.85) 70%, rgba(255,255,255,1) 100%);
        }
        .dark .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(15,23,42,0) 0%, rgba(15,23,42,0.85) 70%, rgba(15,23,42,1) 100%);
        }

        /* ── Bottom sheet ── */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.12);
        }

        /* ── Top bar glass + gradient border ── */
        .tracking-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 20;
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2563eb;
            /* Glassmorphism */
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            /* Gradient border via box-shadow + outline trick */
            border: 2px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 4px 24px rgba(37,99,235,0.15), inset 0 0 0 0px transparent;
        }
        .tracking-badge::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 9999px;
            padding: 2px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .dark .tracking-badge {
            background: rgba(30,41,59,0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            color: #93c5fd;
        }

        /* ── ETA banner ── */
        .eta-banner {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: #fff;
            border-radius: 14px;
            padding: 12px 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(6,182,212,0.25);
        }
        .eta-banner .eta-icon {
            font-size: 20px;
        }

        /* ── Vertical Timeline ── */
        .v-timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding: 0 8px;
            margin-bottom: 18px;
        }
        .v-timeline-step {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            position: relative;
            min-height: 52px;
        }
        .v-timeline-step:last-child { min-height: unset; }

        /* Indicator column */
        .v-timeline-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .v-timeline-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        /* Completed dot */
        .v-timeline-dot.completed {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 2px 10px rgba(34,197,94,0.35);
        }
        /* Active dot */
        .v-timeline-dot.active {
            background: #fff;
            border: 3px solid #22c55e;
            box-shadow: 0 0 0 6px rgba(34,197,94,0.18);
            position: relative;
        }
        .v-timeline-dot.active .active-pulse {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            animation: timelinePulse 1.5s ease-in-out infinite;
        }
        .dark .v-timeline-dot.active {
            background: #1e293b;
            border-color: #22c55e;
        }
        /* Pending dot */
        .v-timeline-dot.pending {
            background: #e5e7eb;
            color: #9ca3af;
            border: 2px solid #d1d5db;
        }
        .dark .v-timeline-dot.pending {
            background: #334155;
            color: #64748b;
            border-color: #475569;
        }
        /* Connector line */
        .v-timeline-line {
            width: 4px;
            flex-grow: 1;
            min-height: 24px;
            margin: 4px 0;
            border-radius: 3px;
        }
        .v-timeline-line.solid {
            background: linear-gradient(to bottom, #22c55e, #16a34a);
        }
        .v-timeline-line.active-line {
            background: repeating-linear-gradient(
                to bottom,
                #22c55e 0px, #22c55e 6px,
                transparent 6px, transparent 12px
            );
            animation: lineScroll 1s linear infinite;
        }
        .v-timeline-line.dashed {
            background: repeating-linear-gradient(
                to bottom,
                #d1d5db 0px, #d1d5db 6px,
                transparent 6px, transparent 12px
            );
        }
        .dark .v-timeline-line.dashed {
            background: repeating-linear-gradient(
                to bottom,
                #475569 0px, #475569 6px,
                transparent 6px, transparent 12px
            );
        }
        /* Label */
        .v-timeline-label {
            padding-top: 4px;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
        }
        .v-timeline-label.completed-label { color: #16a34a; }
        .v-timeline-label.active-label { color: #15803d; }
        .dark .v-timeline-label.active-label { color: #4ade80; }
        .v-timeline-label.pending-label { color: #9ca3af; }
        .dark .v-timeline-label.pending-label { color: #64748b; }

        @keyframes timelinePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
        @keyframes lineScroll {
            from { background-position: 0 0; }
            to { background-position: 0 12px; }
        }

        /* ── Enhanced tech card ── */
        .tech-card {
            border-radius: 18px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .dark .tech-card {
            background: #1e293b;
            border-color: #334155;
        }
        .tech-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            border-radius: 0 18px 18px 0;
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6, #06b6d4);
        }
        .tech-photo-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px #fff, 0 0 0 5px rgba(59, 130, 246, 0.25);
        }
        .dark .tech-photo-circle {
            background: linear-gradient(135deg, #334155, #475569);
            box-shadow: 0 0 0 3px #1e293b, 0 0 0 5px rgba(96, 165, 250, 0.25);
        }
        .tech-stars { display: flex; gap: 2px; }
        .tech-stars .star {
            color: #fbbf24;
            font-size: 14px;
        }
        .tech-stars .star.empty { color: #d1d5db; }
        .dark .tech-stars .star.empty { color: #475569; }
        .tech-phone-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 3px 12px rgba(34,197,94,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        .tech-phone-btn:hover { transform: scale(1.1); }
        .tech-msg-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 3px 12px rgba(37,99,235,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        .tech-msg-btn:hover { transform: scale(1.1); }

        /* ── Skeleton shimmer ── */
        .skeleton-bar {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        .dark .skeleton-bar {
            background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        /* ── Bottom sheet accent ── */
        .bottom-sheet::before {
            content: '';
            position: absolute;
            top: 0;
            left: 30px;
            right: 30px;
            height: 3px;
            border-radius: 3px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6);
        }

        /* ── ETA pulsing icon ── */
        .eta-icon {
            animation: etaPulse 1.5s ease-in-out infinite;
        }
        @keyframes etaPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* ── Active step background ── */
        .v-timeline-step .active-label {
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(34, 197, 94, 0.08);
        }
        .dark .v-timeline-step .active-label {
            background: rgba(34, 197, 94, 0.06);
        }

        /* ── Chat FAB gradient ── */
        #chat-fab {
            background: linear-gradient(135deg, #22c55e, #16a34a, #059669) !important;
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.35) !important;
        }
        #chat-fab:hover {
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.5) !important;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-dark-bg relative h-screen">

    <!-- ── Map Gradient Overlay ── -->
    <div class="map-gradient-overlay"></div>

    <!-- ── Top Bar (Glass Badge with gradient border) ── -->
    <div class="tracking-badge">
        <span style="width:10px;height:10px;background:#2563eb;border-radius:50%;display:block;animation:timelinePulse 1.5s ease-in-out infinite;"></span>
        تتبع الطلب
    </div>

    <!-- الخريطة (Full Screen) -->
    <div id="map"></div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet bg-white dark:bg-dark-card p-6 slide-up-sheet">
        <!-- Grab handle -->
        <div class="w-12 h-1.5 bg-gray-200 dark:bg-slate-700 rounded-full mx-auto mb-4"></div>

        <!-- ── ETA Banner ── -->
        <div id="eta-banner" class="eta-banner">
            <span class="eta-icon">⏱️</span>
            <span>الوقت المتوقع للوصول: ~15 دقيقة</span>
        </div>

        <!-- ── Vertical Status Timeline ── -->
        <div class="v-timeline" role="list" aria-label="حالة الطلب">

            <!-- Step 1: تم إرسال الطلب — COMPLETED -->
            <div class="v-timeline-step" id="step-accepted">
                <div class="v-timeline-indicator">
                    <div class="v-timeline-dot completed">✓</div>
                    <div class="v-timeline-line solid"></div>
                </div>
                <div class="v-timeline-label completed-label">✅ تم إرسال الطلب</div>
            </div>

            <!-- Step 2: الفني في الطريق — ACTIVE -->
            <div class="v-timeline-step" id="step-onway">
                <div class="v-timeline-indicator">
                    <div class="v-timeline-dot active"><div class="active-pulse"></div></div>
                    <div class="v-timeline-line active-line"></div>
                </div>
                <div class="v-timeline-label active-label">🚗 الفني في الطريق</div>
            </div>

            <!-- Step 3: الفني وصل — PENDING -->
            <div class="v-timeline-step" id="step-arrived">
                <div class="v-timeline-indicator">
                    <div class="v-timeline-dot pending">3</div>
                    <div class="v-timeline-line dashed"></div>
                </div>
                <div class="v-timeline-label pending-label">⏳ الفني وصل</div>
            </div>

            <!-- Step 4: جاري العمل — PENDING -->
            <div class="v-timeline-step" id="step-working">
                <div class="v-timeline-indicator">
                    <div class="v-timeline-dot pending">4</div>
                    <div class="v-timeline-line dashed"></div>
                </div>
                <div class="v-timeline-label pending-label">⏳ جاري العمل</div>
            </div>

            <!-- Step 5: تم الانتهاء — PENDING -->
            <div class="v-timeline-step" id="step-done">
                <div class="v-timeline-indicator">
                    <div class="v-timeline-dot pending">5</div>
                    <!-- No line after last step -->
                </div>
                <div class="v-timeline-label pending-label">⏳ تم الانتهاء</div>
            </div>

        </div>

        <!-- ── Technician Info Card (Enhanced) ── -->
        <div id="tech-details" class="tech-card">
            <div style="display:flex;align-items:center;gap:14px;">
                <!-- Photo circle skeleton -->
                <div class="tech-photo-circle">
                    <span style="color:#94a3b8;">👤</span>
                </div>
                <!-- Info area -->
                <div style="flex:1;min-width:0;">
                    <!-- Name skeleton -->
                    <div class="skeleton-bar" style="width:60%;height:16px;margin-bottom:8px;"></div>
                    <!-- Rating stars skeleton -->
                    <div class="tech-stars">
                        <span class="star empty">★</span>
                        <span class="star empty">★</span>
                        <span class="star empty">★</span>
                        <span class="star empty">★</span>
                        <span class="star empty">★</span>
                    </div>
                    <!-- Subtitle skeleton -->
                    <div class="skeleton-bar" style="width:40%;height:12px;margin-top:6px;"></div>
                </div>
                <!-- Phone button -->
                <div style="display:flex;gap:8px;">
                    <button class="tech-msg-btn" aria-label="رسالة للفني">💬</button>
                    <button class="tech-phone-btn" aria-label="اتصال بالفني">📞</button>
                </div>
            </div>
        </div>
    </div>

    <!-- زر المحادثة العائم (Chat FAB) -->
    <a id="chat-fab" href="#" class="fixed bottom-[220px] left-5 z-20 w-14 h-14 bg-green-500 hover:bg-green-600 text-white rounded-full shadow-xl shadow-green-500/30 flex items-center justify-center text-2xl transition-all active:scale-90 hover:scale-110" style="animation: bounceIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);">
        💬
        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white dark:border-dark-bg animate-pulse"></span>
    </a>
    <style>
        @keyframes bounceIn { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
    </style>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const rid = params.get('requestId');
            if (rid) {
                document.getElementById('chat-fab').href = 'chat.html?requestId=' + rid;
            }
        })();
    </script>

    <script type="module" src="js/tracking.js"></script>
    <script type="module" src="../js/shared.js"></script>
</body>
</html>
