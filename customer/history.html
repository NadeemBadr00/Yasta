<!-- customer/history.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <script>var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')};</script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يسطا | سجلاتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', text: '#f8fafc', muted: '#94a3b8' } }, fontFamily: { cairo: ['Cairo', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ─── Header accent line ─── */
        .header-accent {
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #60a5fa, #818cf8, #60a5fa, #2563eb);
            background-size: 200% 100%;
            animation: accent-shimmer 3s ease-in-out infinite;
        }
        @keyframes accent-shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ─── Tab filters ─── */
        #history-tabs {
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        #history-tabs::-webkit-scrollbar { display: none; }

        .tab-filter-btn {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            border: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f1f5f9;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dark .tab-filter-btn {
            background: #1e293b;
            color: #94a3b8;
        }
        .tab-filter-btn:hover {
            background: #e2e8f0;
            color: #334155;
        }
        .dark .tab-filter-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }
        .tab-filter-btn.active {
            background: linear-gradient(135deg, #2563eb, #3b82f6, #60a5fa);
            color: #fff;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.35);
            transform: scale(1.03);
        }
        /* Tab colored dots */
        .tab-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .tab-dot-blue { background: #3b82f6; }
        .tab-dot-green { background: #22c55e; }
        .tab-dot-amber { background: #f59e0b; }
        .tab-dot-red { background: #ef4444; }
        .tab-filter-btn.active .tab-dot {
            background: rgba(255,255,255,0.8);
        }

        /* ─── Stats cards ─── */
        .stat-card {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 16px;
            padding: 14px 12px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 3px;
            border-radius: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .stat-card:hover::after {
            opacity: 1;
        }
        .dark .stat-card {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(51, 65, 85, 0.5);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.12);
        }
        .stat-card .stat-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }
        .stat-card .stat-value {
            font-size: 1.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .dark .stat-card .stat-value {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            font-weight: 600;
            margin-top: 2px;
        }
        .dark .stat-card .stat-label {
            color: #94a3b8;
        }
        /* Staggered stat card entrance */
        @keyframes statFadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stat-card:nth-child(1) { animation: statFadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
        .stat-card:nth-child(2) { animation: statFadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
        .stat-card:nth-child(3) { animation: statFadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }

        /* ─── Premium card styling for dynamically generated cards ─── */
        #history-container > div {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        #history-container > div:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.10), 0 2px 8px rgba(0,0,0,0.06);
        }
        /* Staggered card entrance */
        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #history-container > div {
            animation: cardSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        #history-container > div:nth-child(1) { animation-delay: 0s; }
        #history-container > div:nth-child(2) { animation-delay: 0.08s; }
        #history-container > div:nth-child(3) { animation-delay: 0.16s; }
        #history-container > div:nth-child(4) { animation-delay: 0.24s; }
        #history-container > div:nth-child(5) { animation-delay: 0.32s; }

        /* Status-colored border strips */
        #history-container > div[class*="border-green"],
        #history-container > div.status-completed {
            border-right: 4px solid #22c55e;
        }
        #history-container > div[class*="border-amber"],
        #history-container > div.status-active,
        #history-container > div.status-ongoing {
            border-right: 4px solid #f59e0b;
        }
        #history-container > div[class*="border-red"],
        #history-container > div.status-cancelled {
            border-right: 4px solid #ef4444;
        }

        /* Warranty badge gradient */
        #history-container [class*="warranty"],
        #history-container .warranty-badge {
            background: linear-gradient(135deg, #059669, #10b981);
            color: #fff;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Cost box premium feel */
        #history-container [class*="cost"],
        #history-container .cost-box {
            background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(96,165,250,0.08));
            border: 1px solid rgba(37, 99, 235, 0.15);
            border-radius: 12px;
            padding: 6px 12px;
        }
        .dark #history-container [class*="cost"],
        .dark #history-container .cost-box {
            background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(96,165,250,0.10));
            border-color: rgba(96, 165, 250, 0.2);
        }

        /* Star rating golden gradient */
        #history-container .star-filled,
        #history-container [class*="text-yellow"] {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── Enhanced loading skeleton ─── */
        .skeleton-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .dark .skeleton-card {
            background: #1e293b;
            border-color: #334155;
        }
        .skeleton-line {
            border-radius: 8px;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        .dark .skeleton-line {
            background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
            background-size: 200% 100%;
        }
        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── Empty state ─── */
        .history-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
        .history-empty .empty-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }
        .history-empty .empty-text {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .history-empty .empty-hint {
            font-size: 0.8rem;
            margin-top: 0.25rem;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-dark-text flex flex-col min-h-screen transition-colors pb-24">

    <header class="bg-white dark:bg-dark-card shadow-sm dark:border-b dark:border-dark-border py-4 px-4 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex items-center gap-4">
            <a href="dashboard.html" class="md:hidden w-10 h-10 bg-gray-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-xl hover:bg-gray-200 transition">&rarr;</a>
            <div class="flex items-center gap-2">
                <span class="text-2xl">📋</span>
                <h1 class="text-xl font-black text-primary-600 dark:text-primary-400">سجل الطلبات</h1>
                <span id="history-count" class="bg-primary-600 text-white text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
        </div>
        <div class="header-accent mt-3 -mb-4 mx-[-16px]"></div>
    </header>

    <!-- Tab Filters -->
    <div id="history-tabs" class="sticky top-[73px] z-30 bg-white/80 dark:bg-dark-bg/80 backdrop-blur-md border-b border-gray-200/50 dark:border-dark-border/50">
        <div class="max-w-5xl mx-auto px-4 py-3 flex gap-2 overflow-x-auto">
            <button class="tab-filter-btn active" data-filter="all"><span class="tab-dot tab-dot-blue"></span>الكل</button>
            <button class="tab-filter-btn" data-filter="completed"><span class="tab-dot tab-dot-green"></span>مكتمل</button>
            <button class="tab-filter-btn" data-filter="active"><span class="tab-dot tab-dot-amber"></span>جاري</button>
            <button class="tab-filter-btn" data-filter="cancelled"><span class="tab-dot tab-dot-red"></span>ملغي</button>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-5xl mx-auto w-full slide-up">

        <!-- Stats Summary Bar -->
        <div class="grid grid-cols-3 gap-3 mb-5">
            <div id="stat-total" class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value">--</div>
                <div class="stat-label">إجمالي الطلبات</div>
            </div>
            <div id="stat-amount" class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value">--</div>
                <div class="stat-label">المبلغ الكلي</div>
            </div>
            <div id="stat-rating" class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value">--</div>
                <div class="stat-label">التقييم</div>
            </div>
        </div>

        <!-- History Cards Container -->
        <div id="history-container" class="space-y-4">
            <!-- Enhanced skeleton loading -->
            <div class="skeleton-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="skeleton-line w-10 h-10 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="skeleton-line h-4 w-3/4"></div>
                        <div class="skeleton-line h-3 w-1/2"></div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="skeleton-line h-3 w-full"></div>
                    <div class="skeleton-line h-3 w-5/6"></div>
                </div>
                <div class="flex gap-2 mt-4">
                    <div class="skeleton-line h-8 w-20 rounded-full"></div>
                    <div class="skeleton-line h-8 w-24 rounded-full"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="skeleton-line w-10 h-10 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="skeleton-line h-4 w-2/3"></div>
                        <div class="skeleton-line h-3 w-2/5"></div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="skeleton-line h-3 w-full"></div>
                    <div class="skeleton-line h-3 w-4/6"></div>
                </div>
                <div class="flex gap-2 mt-4">
                    <div class="skeleton-line h-8 w-20 rounded-full"></div>
                    <div class="skeleton-line h-8 w-24 rounded-full"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="flex items-center gap-3 mb-4">
                    <div class="skeleton-line w-10 h-10 rounded-full shrink-0"></div>
                    <div class="flex-1 space-y-2">
                        <div class="skeleton-line h-4 w-1/2"></div>
                        <div class="skeleton-line h-3 w-1/3"></div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="skeleton-line h-3 w-5/6"></div>
                    <div class="skeleton-line h-3 w-3/6"></div>
                </div>
                <div class="flex gap-2 mt-4">
                    <div class="skeleton-line h-8 w-20 rounded-full"></div>
                    <div class="skeleton-line h-8 w-24 rounded-full"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/history.js"></script>
    <script type="module">
        import { injectBottomNav } from '../js/shared.js';
        injectBottomNav('customer', 'history');
    </script>
</body>
</html>
